<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Block browser scroll-restoration IMMEDIATELY — before any CSS/JS/paint.
         Without this inline script the browser restores a previous scroll position
         after our JS bundle loads, causing the visible "jump from bottom to top". -->
    <script>if ('scrollRestoration' in history) history.scrollRestoration = 'manual';</script>
    <title>ברזילי, עזורי ושות' | משרד עורכי דין</title>
    
    <!-- Open Graph / WhatsApp / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://baz-law.co.il/" />
    <meta property="og:site_name" content="ברזילי, עזורי ושות' עורכי דין" />
    <meta property="og:title" content="ברזילי, עזורי ושות' | משרד עורכי דין" />
    <meta property="og:description" content="משרד עורכי דין המתמחה בנדל&quot;ן, התחדשות עירונית, רישום זכויות, צוואות, ירושות וייפוי כוח מתמשך. ניסיון, מקצועיות ושירות אישי." />
    <meta property="og:image" content="https://baz-law.co.il/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ברזילי, עזורי ושות' משרד עורכי דין" />
    <meta property="og:locale" content="he_IL" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ברזילי, עזורי ושות' | משרד עורכי דין" />
    <meta name="twitter:description" content="משרד עורכי דין המתמחה בנדל&quot;ן, התחדשות עירונית, רישום זכויות, צוואות, ירושות וייפוי כוח מתמשך." />
    <meta name="twitter:image" content="https://baz-law.co.il/og-image.jpg" />
    
    <!-- Canonical & description -->
    <meta name="description" content="משרד עורכי דין המתמחה בנדל&quot;ן, התחדשות עירונית, רישום זכויות, צוואות, ירושות וייפוי כוח מתמשך. ניסיון, מקצועיות ושירות אישי." />
    <link rel="canonical" href="https://baz-law.co.il/" />

    <!-- Critical CSS: reserve hero viewport height before ANY stylesheet or JS loads.
         Prevents the hero from collapsing to 0 during initial blank render, eliminating
         the "blank → full content" layout shift that Lighthouse catches as CLS. -->
    <style>
      html, body, #root { min-height: 100vh; }
      .hero { min-height: 100vh; min-height: 100dvh; }
    </style>

    <!-- Hero LCP: serve mobile (32 KB) or desktop (125 KB) WebP, highest priority -->
    <link rel="preload" as="image" fetchpriority="high" type="image/webp"
          href="/hero.webp"
          imagesrcset="/hero-mobile.webp 768w, /hero.webp 1920w"
          imagesizes="100vw" />

    <!-- Google Fonts: preconnect + preload critical Hebrew woff2 files so they are
         available before first paint → font-display:optional prevents any swap/CLS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="font" type="font/woff2" crossorigin
          href="https://fonts.gstatic.com/s/heebo/v28/NGSpv5_NC0k9P_v6ZUCbLRAHxK1EiSysd0mm7U6CXDZW.woff2" />
    <link rel="preload" as="font" type="font/woff2" crossorigin
          href="https://fonts.gstatic.com/s/heebo/v28/NGSpv5_NC0k9P_v6ZUCbLRAHxK1Ebiusd0mm7U6CXDZW.woff2" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;0,900;1,400&family=Heebo:wght@300;400;500;600;700&display=swap" />

    <!-- Elfsight script is injected lazily via IntersectionObserver in Testimonials.jsx -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
