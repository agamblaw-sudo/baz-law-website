    <!-- Critical CSS:
         1. Paint the hero background image on #root immediately — before any JS or
            external CSS loads — so the first visible frame already shows the BSR
            towers instead of a solid-color flash.  The image is preloaded (see below)
            so it arrives in the browser cache before this rule is applied.
         2. Reserve 100vh so there is never a blank-then-jump layout shift. -->
    <style>
      html, body { min-height: 100vh; background: #0a1628; }
      #root {
        min-height: 100vh;
        background: url('/hero-tel-aviv-sea-sharpened.webp') center center / cover no-repeat #0a1628;
      }
      @media (max-width: 768px) {
        #root { background-image: url('/hero-tel-aviv-sea-mobile.webp'); }
      }
      .hero { min-height: 100vh; min-height: 100dvh; }
    </style>

    <!-- Hero LCP: serve mobile (506 KB) or desktop (1.3 MB) WebP, highest priority -->
    <link rel="preload" as="image" fetchpriority="high" type="image/webp"
          href="/hero-tel-aviv-sea-sharpened.webp"
          imagesrcset="/hero-tel-aviv-sea-mobile.webp 768w, /hero-tel-aviv-sea-sharpened.webp 1920w"
          imagesizes="100vw" />

    <!-- Google Fonts: preconnect + preload critical Hebrew woff2 files so they are
         available before first paint → font-display:optional prevents any swap/CLS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="font" type="font/woff2" crossorigin
          href="https://fonts.gstatic.com/s/heebo/v28/NGSpv5_NC0k9P_v6ZUCbLRAHxK1EiSysd0mm7U6CXDZW.woff2" />
